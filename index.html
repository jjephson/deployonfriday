<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Deploy on Friday — Professional WCAG accessibility audits, remediation, and ongoing consulting. Inclusive products that improve with every release.">
    <meta name="author" content="Jimmie Jephson">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0a0a09">
    <title>Deploy on Friday — Accessibility Audits</title>
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
</head>
<body>
    <div id="app"></div>
    <script>
      (function (location) {
        if (location.search[1] === '/') {
          const decoded = location.search
            .slice(1)
            .split('&')
            .map((segment) => segment.replace(/~and~/g, '&'))
            .join('?')
          window.history.replaceState(null, null, decoded)
        }
      })(window.location)
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
